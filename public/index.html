<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b1c2e" />
  <title>Songsmith</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Login -->
  <section id="login-view" class="login-view hidden">
    <form id="login-form" class="login-card">
      <h1>Songsmith</h1>
      <p class="muted">Sign in to your workspace.</p>
      <input id="login-username" type="text" placeholder="Username" autocomplete="username" required />
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </section>

  <!-- App -->
  <div id="app-view" class="app-view hidden">
    <header class="topbar">
      <div class="topbar-left">
        <strong class="brand">Songsmith</strong>
        <input id="draft-title" class="draft-title" placeholder="Untitled" />
      </div>
      <div class="topbar-right">
        <select id="draft-select" class="draft-select" title="Your drafts"></select>
        <button id="new-draft-btn" class="icon-btn" title="New song">+ New</button>
        <span id="save-status" class="save-status muted">saved</span>
        <button id="logout-btn" class="icon-btn" title="Sign out">Sign out</button>
      </div>
    </header>

    <main class="workspace">
      <!-- Sources -->
      <aside class="sources-pane">
        <div class="pane-head">
          <span>Sources</span>
          <div class="pane-head-actions">
            <select id="source-mode" class="source-mode">
              <option value="library">Library (all sources)</option>
              <option value="poetry_random">Public-domain poems</option>
              <option value="my_texts">My texts</option>
            </select>
            <button id="filter-btn" class="icon-btn" title="Choose which sources feed the blend">Filter</button>
            <button id="add-text-btn" class="icon-btn" title="Import your own text">+ Text</button>
            <button id="shuffle-btn" class="icon-btn" title="Shuffle">Shuffle</button>
          </div>
        </div>
        <div id="source-list" class="source-list"></div>
      </aside>

      <!-- Scratchpad -->
      <section class="scratch-pane">
        <div id="scratchpad" class="scratchpad" contenteditable="true" spellcheck="true"
             data-placeholder="Tap or drag a phrase to bring it in. Tap any word for rhymes &amp; synonyms."></div>

        <!-- Ambient "what follows" strip -->
        <div class="follow-strip" id="follow-strip">
          <span class="follow-label">next&nbsp;&rsaquo;</span>
          <div id="follow-chips" class="follow-chips"></div>
        </div>
      </section>

      <!-- Pinned word-tools panel (desktop, when pinned) -->
      <aside id="tools-panel" class="tools-panel hidden"></aside>
    </main>

    <!-- Floating word-tools popup (Option B) -->
    <div id="word-popup" class="word-popup hidden"></div>

    <!-- Import-your-own-text modal -->
    <div id="text-modal" class="modal hidden">
      <div class="modal-card">
        <h2>Import a text</h2>
        <p class="muted">Paste anything — lyrics, a poem, a chapter, an article, your own writing. It becomes cut-up source material.</p>
        <input id="text-title" placeholder="Title (e.g. On the Road — Kerouac)" />
        <input id="text-author" placeholder="Author / source (optional)" />
        <textarea id="text-body" rows="10" placeholder="Paste your text here…"></textarea>
        <p id="text-error" class="error hidden"></p>
        <div class="modal-actions">
          <button id="text-cancel" class="icon-btn">Cancel</button>
          <button id="text-save" class="primary-btn">Save text</button>
        </div>
      </div>
    </div>

    <!-- Source-filter modal -->
    <div id="filter-modal" class="modal hidden">
      <div class="modal-card">
        <h2>Choose sources</h2>
        <p class="muted">Pick which voices feed the blend. Select all (or none) for everything.</p>
        <div class="filter-top">
          <button id="filter-all" class="icon-btn">Select all</button>
          <button id="filter-none" class="icon-btn">Clear</button>
        </div>
        <div id="filter-list" class="filter-list"></div>
        <div class="modal-actions">
          <button id="filter-cancel" class="icon-btn">Cancel</button>
          <button id="filter-apply" class="primary-btn">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
